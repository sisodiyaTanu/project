<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript  Calculator</title>

    <style>
        h1{
            text-align: center;
            padding: 25px;
            background-color: rgb(89, 158, 151);
            color:azure
        }

        #clear{
            width:270px;
            border:3px solid rgb(89, 158, 151);
            border-radius: 30px;
            padding: 20px;
            background-color: rgb(217, 181, 137);
        }

        .formstyle
        {
            width: 280px;
            height: 530px;
            margin: auto;
            border: 15px solid rgb(89, 158, 151);
            border-radius: 25px;
            padding: 20px;
        }

        input
        {
            width: 55px;
            background-color: rgb(217, 181, 137);
            color: antiquewhite;
            border:solid rgb(89, 158, 151);
            border-radius: 7px;
            padding: 20px;
            margin: 5px;
            font-size: 15px;
        }


        #calc{
            width: 225px;
            border:5px solid rgb(89,158,151);
            border-radius:3px;
            padding:20px;
            margin: 5px;
        }
        #text{
            width: 220px;
        }
    </style>
</head>
<body>
  <h1>Calculator program</h1>  
  <div class="formstyle">
    <form name="form1">

        <!-- This input box shows the button pressed by the user in calculator. -->
        <input id="calc" type ="text" name = "answer" ><br><br>
        <!-- Display the calculator button one screen. -->
        <!-- onclick() function display the number pressed by the user. -->
        <input type="button" value="1" onclick="form1.answer.value +='1'">
        <input type="button" value="2" onclick="form1.answer.value +='2'">
        <input type="button" value="3" onclick="form1.answer.value +='3'">
        <input type="button" value="+" onclick="form1.answer.value +='+ '">
        <br><br>
        <input type="button" value="4" onclick="form1.answer.value +='4'">
        <input type="button" value="5" onclick="form1.answer.value +='5'">
        <input type="button" value="6" onclick="form1.answer.value +='6'">
        <input type="button" value="-" onclick="form1.answer.value +='-'">
        <br><br>
        <input type="button" value="7" onclick="form1.answer.value +='7'">
        <input type="button" value="8" onclick="form1.answer.value +='8'">
        <input type="button" value="9" onclick="form1.answer.value +='9'">
        <input type="button" value="*" onclick="form1.answer.value +='*'">
        <br><br>
        <input type="button" value="/" onclick="form1.answer.value +='/'">
        <input type="button" value="0" onclick="form1.answer.value +='0'">
        <input type="button" value="." onclick="form1.answer.value +='.'">
        <!-- When we click on the '=' button , the onclick() shows the sum results on the calculator screen. -->
        <input type="button" value = "=" onclick = "form1.answer.value = eval(form1.answer.value)">
        <br><br>
        <!-- Display the Cancel button and erase all data-->
        <input type ="button" value = "Clear All" onclick = "form1.answer.value =''" id="clear">
        <br>
    </form>
    </form>
  </div>
</body>
</html>
